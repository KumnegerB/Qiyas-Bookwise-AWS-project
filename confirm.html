<!DOCTYPE html>
<html>

<head>

<title>Confirm Account - BookWise</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container">

<h2>Verify Your Account</h2>

<p>
Enter the verification code sent to your email.
</p>


<input 
id="email"
type="email"
placeholder="Email">


<br><br>


<input 
id="code"
type="text"
placeholder="Verification Code">


<br><br>


<button onclick="confirmUser()">
Verify Account
</button>


</div>



<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1691.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@3.0.14/dist/amazon-cognito-identity.min.js"></script>

<script src="js/auth.js"></script>


</body>

</html>
